version: '3.8'

services:
  master:
    build: .
    container_name: mpi_master
    volumes:
      - .:/app
    hostname: master
    networks:
      - mpi_net

  worker1:
    build: .
    container_name: mpi_worker1
    volumes:
      - .:/app
    hostname: worker1
    networks:
      - mpi_net

  worker2:
    build: .
    container_name: mpi_worker2
    volumes:
      - .:/app
    hostname: worker2
    networks:
      - mpi_net

  worker3:
    build: .
    container_name: mpi_worker3
    volumes:
      - .:/app
    hostname: worker3
    networks:
      - mpi_net

  worker4:
    build: .
    container_name: mpi_worker4
    volumes:
      - .:/app
    hostname: worker4
    networks:
      - mpi_net

networks:
  mpi_net:
    driver: bridge